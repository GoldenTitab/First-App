name: first_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.6.0
  audioplayers: ^6.8.1
  go_router: ^17.3.0
  equatable: ^2.1.0
  font_awesome_flutter: ^11.0.0
  cupertino_icons: ^1.0.9

  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_analytics: ^11.5.0

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

  # flutter_riverpod حذف شد - در پروژه استفاده نمیشه

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.4
  build_runner: ^2.4.15
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Vazir
      fonts:
        - asset: assets/fonts/Vazir.ttf